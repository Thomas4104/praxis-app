<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Serverfehler</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; background: #f5f7fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .error-page { text-align: center; padding: 40px 20px; }
        .error-code { font-size: 96px; font-weight: 700; color: #e74c3c; margin: 0; line-height: 1; }
        .error-title { font-size: 24px; color: #333; margin: 16px 0 8px; }
        .error-message { color: #666; margin-bottom: 32px; }
        .btn { display: inline-block; padding: 12px 24px; background: #4a90d9; color: #fff; text-decoration: none; border-radius: 6px; font-size: 14px; }
        .btn:hover { background: #3a7bc8; }
    </style>
</head>
<body>
    <div class="error-page">
        <p class="error-code">500</p>
        <h1 class="error-title">Interner Serverfehler</h1>
        <p class="error-message">Es ist ein unerwarteter Fehler aufgetreten. Bitte versuchen Sie es spaeter erneut.</p>
        <a href="/" class="btn">Zurueck zum Dashboard</a>
    </div>
</body>
</html>
