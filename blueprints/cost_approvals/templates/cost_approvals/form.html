{% extends "base.html" %}
{% block title %}Neue Gutsprache - OMNIA Praxissoftware{% endblock %}
{% block page_title %}Neue Gutsprache{% endblock %}

{% block content %}
<div class="section-header">
    <h2>Kostengutsprache erstellen</h2>
    <a href="{{ url_for('cost_approvals.index') }}" class="btn btn-secondary">← Zurück</a>
</div>

<div class="form-container">
    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label for="patient_id">Patient *</label>
            <select name="patient_id" id="patient_id" required class="form-select">
                <option value="">-- Patient auswählen --</option>
                {% for p in patienten %}
                <option value="{{ p.id }}">{{ p.full_name }} ({{ p.date_of_birth.strftime('%d.%m.%Y') if p.date_of_birth else '-' }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="insurance_provider_id">Versicherer</label>
            <select name="insurance_provider_id" id="insurance_provider_id" class="form-select">
                <option value="">-- Versicherer auswählen --</option>
                {% for v in versicherungen %}
                <option value="{{ v.id }}">{{ v.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="doctor_id">Verordnender Arzt</label>
            <select name="doctor_id" id="doctor_id" class="form-select">
                <option value="">-- Arzt auswählen --</option>
                {% for a in aerzte %}
                <option value="{{ a.id }}">{{ a.name }} ({{ a.specialty or '-' }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="series_id">Behandlungsserie (optional)</label>
            <select name="series_id" id="series_id" class="form-select">
                <option value="">-- Keine Serie --</option>
                {% for s in serien %}
                <option value="{{ s.id }}">{{ s.patient.full_name if s.patient else '-' }} - {{ s.template.name if s.template else 'Therapie' }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="treatment_type">Art der Behandlung</label>
            <input type="text" name="treatment_type" id="treatment_type" class="form-input" placeholder="z.B. Physiotherapie">
        </div>

        <div class="form-group">
            <label for="diagnosis">Diagnose</label>
            <textarea name="diagnosis" id="diagnosis" class="form-input" rows="3" placeholder="Diagnose eingeben..."></textarea>
        </div>

        <div class="form-group">
            <label for="approved_sessions">Beantragte Sitzungen</label>
            <input type="number" name="approved_sessions" id="approved_sessions" class="form-input" min="1" placeholder="Anzahl Sitzungen">
        </div>

        <div class="form-group">
            <label for="notes">Bemerkungen</label>
            <textarea name="notes" id="notes" class="form-input" rows="2" placeholder="Zusätzliche Bemerkungen..."></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Gutsprache erstellen</button>
            <a href="{{ url_for('cost_approvals.index') }}" class="btn btn-secondary">Abbrechen</a>
        </div>
    </form>
</div>
{% endblock %}
