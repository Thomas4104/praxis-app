{% extends "base.html" %}

{% block title %}Passwort aendern{% endblock %}

{% block breadcrumbs %}
<a href="{{ url_for('dashboard.index') }}">Dashboard</a> / Passwort aendern
{% endblock %}

{% block page_title %}Passwort aendern{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px;">
    <div class="card-body">
        <form method="POST">
            <div class="form-group">
                <label for="current_password">Aktuelles Passwort</label>
                <input type="password" id="current_password" name="current_password"
                       class="form-control" required>
            </div>

            <div class="form-group">
                <label for="new_password">Neues Passwort</label>
                <input type="password" id="new_password" name="new_password"
                       class="form-control" required minlength="4">
            </div>

            <div class="form-group">
                <label for="confirm_password">Neues Passwort bestaetigen</label>
                <input type="password" id="confirm_password" name="confirm_password"
                       class="form-control" required minlength="4">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Passwort aendern</button>
                <a href="{{ url_for('dashboard.index') }}" class="btn btn-secondary">Abbrechen</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
