# OMNIA Praxissoftware - Nginx Konfiguration
# VORAUSSETZUNG: SSL-Zertifikate muessen vorhanden sein unter:
#   /etc/letsencrypt/live/app.omnia-health.ch/fullchain.pem
#   /etc/letsencrypt/live/app.omnia-health.ch/privkey.pem
# Erstellen mit: certbot certonly --webroot -w /var/www/certbot -d app.omnia-health.ch

server_tokens off;

# Rate-Limiting Zone fuer Login (10 Requests/Minute pro IP)
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;

upstream gunicorn {
    server web:8000;
}

# HTTP -> HTTPS Redirect
server {
    listen 80;
    server_name app.omnia-health.ch;

    # Certbot ACME-Challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl;
    http2 on;
    server_name app.omnia-health.ch;

    # SSL-Zertifikate (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/app.omnia-health.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.omnia-health.ch/privkey.pem;

    # Moderne TLS-Einstellungen
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    client_max_body_size 16M;

    # Gzip-Kompression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;

    # Static Files mit 1-Jahr Cache
    location /static/ {
        alias /app/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Uploads mit 1h Cache
    location /uploads/ {
        alias /app/uploads/;
        expires 1h;
        add_header Cache-Control "public";
    }

    # Rate-Limiting fuer Login-Endpunkt
    location /auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Alles andere an Gunicorn proxyen
    location / {
        proxy_pass http://gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket-Support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
